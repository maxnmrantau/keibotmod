<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - KeiBot Factory</title>
    <style>
        body { margin: 0; background: #05080d; color: #c8daea; font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #090d14; border: 1px solid #162030; border-radius: 16px; padding: 40px; width: 100%; max-width: 360px; text-align: center; }
        input { width: 100%; padding: 14px; background: #0d1520; border: 1px solid #1e2e42; color: #fff; border-radius: 8px; font-size: 16px; outline: none; text-align: center; box-sizing: border-box; }
        button { width: 100%; padding: 14px; margin-top: 20px; border: none; border-radius: 8px; background: #00d4ff; color: #000; font-size: 14px; font-weight: bold; cursor: pointer; }
        .error { color: #ff4d6d; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:#fff; margin-top:0;">RESTRICTED AREA</h2>
        <p style="font-size:12px; color:#7a9ab8; margin-bottom:20px;">Masukkan PIN Rahasia Anda</p>
        <form method="POST" action="/login">
            <input type="password" name="password" placeholder="PIN Rahasia" required autofocus>
            <button type="submit">UNLOCK SYSTEM</button>
            <div class="error">{% if error %}{{ error }}{% endif %}</div>
        </form>
    </div>
</body>
</html>
